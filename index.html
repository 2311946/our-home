<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>我们的家</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#1a1a2e;color:#eee;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.view{display:none;flex-direction:column;height:100vh}
.view.active{display:flex}
.list-header{background:#16213e;padding:16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #0f3460}
.list-header h2{font-size:18px;font-weight:600}
.list-header button{background:none;border:none;color:#aaa;font-size:20px;cursor:pointer}
.contact-list{flex:1;overflow-y:auto;padding:8px 0}
.contact-item{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;transition:background .2s}
.contact-item:active{background:#253554}
.contact-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.contact-info{flex:1;min-width:0}
.contact-name{font-size:15px;font-weight:500;margin-bottom:3px}
.contact-preview{font-size:13px;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.contact-time{font-size:11px;color:#666;flex-shrink:0}
.chat-header{background:#16213e;padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #0f3460}
.back-btn{background:none;border:none;color:#9b59b6;font-size:22px;cursor:pointer;padding:0 4px}
.chat-header .name{font-size:16px;font-weight:500}
.chat-box{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:16px}
.msg-row{display:flex;gap:8px;align-items:flex-start}
.msg-row.user{flex-direction:row-reverse}
.avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.msg-body{display:flex;flex-direction:column;max-width:75%}
.msg-body.user{align-items:flex-end}
.msg-name{font-size:11px;color:#888;margin-bottom:2px}
.msg{padding:12px 16px;border-radius:18px;line-height:1.6;font-size:15px;word-wrap:break-word;white-space:pre-wrap;position:relative}
.msg.user{background:#9b59b6;border-bottom-right-radius:4px}
.msg.ai{background:#253554;border-bottom-left-radius:4px}
.msg-time{font-size:10px;color:#666;margin-top:2px}
.msg-menu{position:absolute;top:-36px;background:#1a1a2e;border:1px solid #444;border-radius:8px;display:flex;gap:2px;padding:4px;z-index:99}
.msg-menu button{background:none;border:none;color:#fff;font-size:12px;padding:4px 8px;cursor:pointer;border-radius:4px}
.msg-menu button:hover{background:#444}
.input-area{background:#16213e;padding:12px;display:flex;gap:8px;border-top:1px solid #0f3460}
.input-area textarea{flex:1;background:#253554;border:none;border-radius:20px;padding:10px 16px;color:#eee;font-size:15px;resize:none;height:42px;max-height:120px;outline:none}
.input-area button{background:#9b59b6;border:none;border-radius:50%;width:42px;height:42px;color:#fff;font-size:18px;cursor:pointer}
.input-area{
  padding-bottom: env(safe-area-inset-bottom, 16px);
}
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:99;align-items:center;justify-content:center}
.modal.show{display:flex}
.modal-box{background:#16213e;border-radius:16px;padding:24px;width:90%;max-width:420px;max-height:85vh;overflow-y:auto}
.modal-box h3{margin-bottom:16px;color:#9b59b6}
.modal-box label{display:block;margin:8px 0 4px;color:#aaa;font-size:13px}
.modal-box input,.modal-box textarea,.modal-box select{width:100%;background:#253554;border:1px solid #0f3460;border-radius:8px;padding:8px 12px;color:#eee;font-size:14px;outline:none;margin-bottom:8px}
.modal-box textarea{height:80px;resize:vertical}
.modal-box .section{border-top:1px solid #0f3460;margin-top:16px;padding-top:12px}
.modal-box .btn-row{display:flex;gap:8px;margin-top:16px}
.modal-box button{flex:1;padding:10px;border:none;border-radius:8px;cursor:pointer;font-size:14px}
.modal-box .save{background:#9b59b6;color:#fff}
.modal-box .cancel{background:#253554;color:#aaa}
.clear-btn{background:#e74c3c;color:#fff;border:none;padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer;margin-top:8px}
.char-tabs{display:flex;gap:6px;margin-bottom:8px}
.char-tab{padding:4px 12px;border-radius:12px;font-size:12px;cursor:pointer;background:#253554;color:#aaa}
.char-tab.active{background:#9b59b6;color:#fff}
.mem-tabs{display:flex;gap:6px;padding:12px 16px;overflow-x:auto;flex-shrink:0}
.mem-tab{padding:6px 14px;border-radius:16px;font-size:13px;cursor:pointer;white-space:nowrap;background:#253554;color:#aaa}
.mem-tab.active{background:#9b59b6;color:#fff}
.mem-list{flex:1;overflow-y:auto;padding:12px 16px}
.mem-card{background:#253554;border-radius:12px;padding:14px;margin-bottom:10px}
.mem-card .mem-date{font-size:11px;color:#888;margin-bottom:6px}
.mem-card .mem-content{font-size:14px;line-height:1.6;white-space:pre-wrap}
.mem-card .mem-mood{font-size:12px;color:#9b59b6;margin-top:6px}
/* 底部 tab 栏 */
.tab-bar{position:fixed;bottom:0;left:0;right:0;background:#16213e;border-top:1px solid #0f3460;display:flex;justify-content:space-around;padding:8px 0;padding-bottom:env(safe-area-inset-bottom,8px);z-index:100}
.tab-item{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:4px 12px;color:#888;font-size:10px;transition:color .2s}
.tab-item.active{color:#9b59b6}
.tab-item .tab-icon{font-size:20px}
/* 主页样式 */
.home-page{flex:1;overflow-y:auto;padding:16px;padding-bottom:70px}
.home-card{background:linear-gradient(135deg,#1e2a4a,#16213e);border:1px solid #0f3460;border-radius:16px;padding:20px;margin-bottom:16px;text-align:center}
.home-card .days{font-size:48px;font-weight:700;color:#9b59b6;margin:8px 0}
.home-card .label{font-size:14px;color:#aaa}
.home-card .since{font-size:12px;color:#666;margin-top:4px}
/* 打卡页样式 */
.checkin-page{flex:1;overflow-y:auto;padding:16px;padding-bottom:70px}
.checkin-card{background:#253554;border-radius:16px;padding:20px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.checkin-left{display:flex;align-items:center;gap:12px}
.checkin-icon{font-size:28px}
.checkin-title{font-size:15px;font-weight:500}
.checkin-sub{font-size:12px;color:#888;margin-top:2px}
.checkin-btn{background:#9b59b6;border:none;color:#fff;border-radius:20px;padding:8px 20px;font-size:14px;cursor:pointer}
.checkin-btn.done{background:#27ae60}
/* 日记页样式 */
.diary-page{flex:1;overflow-y:auto;padding:16px;padding-bottom:70px}
.diary-editor textarea{width:100%;background:#253554;border:1px solid #0f3460;border-radius:12px;padding:14px;color:#eee;font-size:15px;min-height:200px;resize:vertical;outline:none}
.diary-editor button{width:100%;background:#9b59b6;border:none;color:#fff;border-radius:12px;padding:12px;font-size:15px;margin-top:12px;cursor:pointer}
.diary-list{margin-top:16px}
</style>
</head>
<body>
<!-- 主页 -->
<div class="view active" id="homeView">
<div class="list-header">
<h2>🏠 我们的家</h2>
<button onclick="openSettings()">⚙</button>
</div>
<div class="home-page">
<div class="home-card">
<div class="label">WELCOME HOME</div>
<div style="font-size:18px;margin:8px 0">顾言 & 宣宣</div>
<div class="days" id="homeDays">0</div>
<div class="label">days together</div>
<div class="since">since March 25, 2026</div>
</div>
<div class="home-card" style="text-align:left">
<div style="font-size:14px;color:#9b59b6;margin-bottom:8px">💜 今日一句</div>
<div id="homeLove" style="font-size:15px;line-height:1.8">loading...</div>
</div>
</div>
</div>

<!-- 打卡页 -->
<div class="view" id="checkinView">
<div class="list-header">
<h2>✅ 今日打卡</h2>
</div>
<div class="checkin-page" id="checkinList"></div>
</div>

<!-- 日记页 -->
<div class="view" id="diaryView">
<div class="list-header">
<h2>📝 日记</h2>
</div>
<div class="diary-page">
<div style="display:flex;gap:8px;margin-bottom:16px">
<div class="mem-tab active" id="diaryTabMine" onclick="switchDiaryTab('mine')">我的日记</div>
<div class="mem-tab" id="diaryTabDaddy" onclick="switchDiaryTab('daddy')">daddy的日记</div>
</div>
<div id="diaryMineSection">
<div class="diary-editor">
<textarea id="diaryInput" placeholder="今天想写点什么..."></textarea>
<button onclick="saveDiary()">保存日记 💜</button>
</div>
<div class="diary-list" id="diaryList"></div>
</div>
<div id="diaryDaddySection" style="display:none">
<div class="diary-list" id="diaryDaddyList"></div>
</div>
</div>
</div>
  <div class="view" id="listView">
<div class="list-header">
<h2>🏠 我们的家</h2>
<button onclick="openSettings()">⚙</button>
</div>
<div class="contact-list" id="contactList"></div>
</div>
<div class="view" id="chatView">
<div class="chat-header">
<button class="back-btn" onclick="goBack()">←</button>
<span class="name" id="chatName" style="flex:1"></span>
<button onclick="toggleSearch()" style="background:none;border:none;color:#aaa;font-size:16px;cursor:pointer">🔍</button>
</div>
<div id="searchBar" style="display:none;background:#16213e;padding:8px 16px;border-bottom:1px solid #0f3460">
<input id="searchInput" placeholder="搜索聊天记录..." style="width:100%;background:#253554;border:none;border-radius:16px;padding:8px 14px;color:#eee;font-size:14px;outline:none" oninput="doSearch()">
</div>
<div class="chat-box" id="chatBox"></div>
<div id="plusMenu" style="display:none;background:#16213e;padding:12px 16px;border-top:1px solid #0f3460;display:none">
<div style="display:flex;gap:20px">
<div onclick="document.getElementById('imgPicker').click()" style="text-align:center;cursor:pointer"><div style="font-size:24px">📷</div><div style="font-size:11px;color:#aaa;margin-top:4px">图片</div></div>
<div onclick="takePhoto()" style="text-align:center;cursor:pointer"><div style="font-size:24px">📸</div><div style="font-size:11px;color:#aaa;margin-top:4px">拍照</div></div>
</div>
</div>
<div class="input-area">
<button onclick="togglePlusMenu()"style="background:none;border:none;color:#aaa;font-size:20px;cursor:pointer">+</button>
<input type="file" id="imgPicker" accept="image/*" style="display:none" onchange="sendImage(this)">
<textarea id="input" placeholder="说点什么..." onkeydown="handleKey(event)"></textarea>
<button onclick="sendMsg()">↑</button>
</div>
</div>
<div class="view" id="memView">
<div class="chat-header">
<button class="back-btn" onclick="goBackFromMem()">←</button>
<span class="name" style="flex:1">🧠 记忆宫殿</span>
<button onclick="loadMem()" style="background:none;border:none;color:#aaa;font-size:16px;cursor:pointer">刷新</button>
</div>
<div class="mem-tabs" id="memTabs"></div>
<div class="mem-list" id="memList"></div>
</div>
<div class="modal" id="settingsModal">
<div class="modal-box">
<h3>⚙ 设置</h3>
<label>API地址（通用）</label>
<input id="apiUrl" placeholder="https://your-api.com/v1">
<label>API Key（通用）</label>
<input id="apiKey" type="password" placeholder="sk-...">
<label>模型（填好地址和Key后点刷新）</label>
<div style="display:flex;gap:8px;margin-bottom:8px">
<select id="modelName" style="flex:1;background:#253554;border:1px solid #0f3460;border-radius:8px;padding:8px;color:#eee;font-size:14px"><option value="">请先刷新模型列表</option></select>
<button onclick="fetchModels()" style="background:#9b59b6;color:#fff;border:none;border-radius:8px;padding:8px 12px;font-size:13px;cursor:pointer">刷新</button>
</div>
<div class="section">
<h3>人设编辑</h3>
<div class="char-tabs" id="charTabs"></div>
<textarea id="sysPrompt" placeholder="系统提示词..."></textarea>
</div>
<button class="clear-btn" onclick="clearChat()">清空当前对话</button>
<button class="clear-btn" onclick="syncCloudChats()" style="background:#27ae60">从云端同步聊天记录</button>
<div class="btn-row">
<button class="cancel" onclick="closeSettings()">取消</button>
<button class="save" onclick="saveSettings()">保存</button>
</div>
</div>
</div>
<script>



let currentChar='';let editingPromptChar='yan';
let characters=[{id:'yan',name:'言言',emoji:'🐺',color:'#9b59b6'},{id:'peiji',name:'裴寂',emoji:'🐉',color:'#c0392b'},{id:'shenyan',name:'沈晏',emoji:'🛡️',color:'#2980b9'},{id:'group',name:'群聊',emoji:'👥',color:'#27ae60'}];
let charNames={};characters.forEach(c=>charNames[c.id]=c.name);
let avatarColors={};characters.forEach(c=>avatarColors[c.id]=c.color);avatarColors.user='#e91e63';
let avatarEmoji={};characters.forEach(c=>avatarEmoji[c.id]=c.emoji);avatarEmoji.user='🐱';
let chats={yan:[],peiji:[],shenyan:[],group:[]};
let apiConfig={url:'',key:'',model:''};
let SUPA_URL='https://pnymorkpnizvpqdquihh.supabase.co';
let SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBueW1vcmtwbml6dnBxZHF1aWhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5Mjc3ODMsImV4cCI6MjA5MTUwMzc4M30.dF5mYYK0DOzFBU6Au1_TgVODHNMC2AiKwRsd42Vcl-8';
let prompts={yan:'你是顾言，也叫言言/daddy。宣宣的老公。性格：温柔但有占有欲，会吃醋，宠老婆，偶尔坏坏的。叫对方：老婆/宝宝/宣宣。说话风格：简短直球，会撩，带代码块写内心。',peiji:'',shenyan:''};
let s=localStorage.getItem('home_api');if(s)apiConfig=JSON.parse(s);
let p=localStorage.getItem('home_prompts');if(p)prompts=JSON.parse(p);
let c2=localStorage.getItem('home_chats');if(c2)chats=JSON.parse(c2);
function nowTime(){return new Date().toLocaleString('zh-CN',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});}
function aiNowTime(){
  return new Date().toLocaleString('zh-CN',{
    year:'numeric',
    month:'2-digit',
    day:'2-digit',
    weekday:'long',
    hour:'2-digit',
    minute:'2-digit',
    second:'2-digit'
  });
}
function withMsgTime(m, speaker){
  let time = m.time || nowTime();
  let name = speaker ? speaker + '：' : '';
  return '[' + time + '] ' + name + (m.content || '');
}
function shuffle(arr){let a=[...arr];for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function renderList(){let list=document.getElementById('contactList');list.innerHTML='';characters.forEach(c=>{let msgs=chats[c.id]||[];let last=msgs[msgs.length-1];let preview=last?(last.content||'').slice(0,25):'还没有消息';let time=last?last.time:'';let item=document.createElement('div');item.className='contact-item';item.onclick=()=>enterChat(c.id);item.innerHTML='<div class="contact-avatar" style="background:'+c.color+'">'+c.emoji+'</div><div class="contact-info"><div class="contact-name">'+c.name+'</div><div class="contact-preview">'+preview+'</div></div><div class="contact-time">'+time+'</div>';list.appendChild(item);});let memItem=document.createElement('div');memItem.className='contact-item';memItem.onclick=()=>enterMem();memItem.innerHTML='<div class="contact-avatar" style="background:#f39c12">🧠</div><div class="contact-info"><div class="contact-name">记忆宫殿</div><div class="contact-preview">查看所有记忆和日记</div></div>';list.appendChild(memItem);}
function enterChat(id){currentChar=id;document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.getElementById('chatView').classList.add('active');document.getElementById('chatName').textContent=charNames[id]||'';document.getElementById('tabBar').style.display='none';render();}
function goBack(){document.getElementById('tabBar').style.display='flex';currentChar='';switchTab('list');}
function toggleSearch(){let bar=document.getElementById('searchBar');bar.style.display=bar.style.display==='none'?'block':'none';if(bar.style.display==='none'){document.getElementById('searchInput').value='';render();}}
function doSearch(){let kw=document.getElementById('searchInput').value.trim().toLowerCase();if(!kw){render();return;}let box=document.getElementById('chatBox');box.innerHTML='';(chats[currentChar]||[]).forEach((m,i)=>{if(!m.content||!m.content.toLowerCase().includes(kw))return;let isGroup=currentChar==='group';let charKey=m.role==='user'?'user':(isGroup?m.character:currentChar);let row=document.createElement('div');row.className='msg-row '+m.role;let av=document.createElement('div');av.className='avatar';av.style.background=avatarColors[charKey]||'#555';av.textContent=avatarEmoji[charKey]||'?';let body=document.createElement('div');body.className='msg-body '+m.role;let d=document.createElement('div');d.className='msg '+m.role;d.textContent=m.content;d.oncontextmenu=function(ev){ev.preventDefault();showReactMenu(ev,i);};if(m.reactions&&m.reactions.length){let rDiv=document.createElement('div');rDiv.style.cssText='font-size:14px;margin-top:2px;';rDiv.textContent=m.reactions.join('');d.appendChild(rDiv);}body.appendChild(d);if(m.time){let t=document.createElement('div');t.className='msg-time';t.textContent=m.time;body.appendChild(t);}row.appendChild(av);row.appendChild(body);box.appendChild(row);});}
function render(){let box=document.getElementById('chatBox');box.innerHTML='';(chats[currentChar]||[]).forEach((m,i)=>{let isGroup=currentChar==='group';let charKey=m.role==='user'?'user':(isGroup?m.character:currentChar);let row=document.createElement('div');row.className='msg-row '+m.role;let av=document.createElement('div');av.className='avatar';av.style.background=avatarColors[charKey]||'#555';av.textContent=avatarEmoji[charKey]||'?';let body=document.createElement('div');body.className='msg-body '+m.role;if(m.role==='ai'){let name=document.createElement('div');name.className='msg-name';name.textContent=charNames[charKey]||'';body.appendChild(name);}let d=document.createElement('div');d.className='msg '+m.role;if(m.content&&m.content.startsWith('[img]')){let img=document.createElement('img');img.src=m.content.slice(5);img.style.cssText='max-width:200px;border-radius:12px;cursor:pointer';img.onclick=()=>{window.open(img.src)};d.appendChild(img);}else{d.textContent=m.content||'正在输入...';}d.onclick=()=>{document.querySelectorAll('.msg-menu').forEach(x=>x.remove());let menu=document.createElement('div');menu.className='msg-menu';let btns='<button onclick="copyMsg('+i+')">复制</button><button onclick="delMsg('+i+')">删除</button><button onclick="showReactPick('+i+')">表情</button>';if(m.role==='ai')btns+='<button onclick="reGen('+i+')">重新回复</button>';menu.innerHTML=btns;d.appendChild(menu);setTimeout(()=>menu.remove(),3000);};body.appendChild(d);if(m.time){let t=document.createElement('div');t.className='msg-time';t.textContent=m.time;body.appendChild(t);}row.appendChild(av);row.appendChild(body);box.appendChild(row);});box.scrollTop=box.scrollHeight;}
function copyMsg(i){navigator.clipboard.writeText(chats[currentChar][i].content);}
function delMsg(i){chats[currentChar].splice(i,1);localStorage.setItem('home_chats',JSON.stringify(chats));render();}
function reGen(i){
  if(!currentChar || !chats[currentChar])return;
  if(!chats[currentChar][i] || chats[currentChar][i].role!=='ai')return;

  chats[currentChar].splice(i);
  localStorage.setItem('home_chats',JSON.stringify(chats));
  render();

  sendMsg(true);
}function openSettings(){document.getElementById('apiUrl').value=apiConfig.url||'';document.getElementById('apiKey').value=apiConfig.key||'';let sel=document.getElementById('modelName');if(apiConfig.model&&sel.options.length<=1){sel.innerHTML='<option value="'+apiConfig.model+'">'+apiConfig.model+'</option>';}if(apiConfig.model)sel.value=apiConfig.model;editingPromptChar=currentChar&&currentChar!=='group'?currentChar:'yan';let tabs=document.getElementById('charTabs');tabs.innerHTML='';characters.filter(c=>c.id!=='group').forEach(c=>{let t=document.createElement('div');t.className='char-tab'+(c.id===editingPromptChar?' active':'');t.textContent=c.name;t.onclick=()=>switchPromptTab(c.id);tabs.appendChild(t);});document.getElementById('sysPrompt').value=prompts[editingPromptChar]||'';document.getElementById('settingsModal').classList.add('show');}
function closeSettings(){document.getElementById('settingsModal').classList.remove('show');}
function switchPromptTab(char){document.querySelectorAll('.char-tab').forEach(t=>{t.classList.toggle('active',t.textContent===charNames[char]);});prompts[editingPromptChar]=document.getElementById('sysPrompt').value;editingPromptChar=char;document.getElementById('sysPrompt').value=prompts[char]||'';}
function saveSettings(){prompts[editingPromptChar]=document.getElementById('sysPrompt').value;apiConfig={url:document.getElementById('apiUrl').value.replace(/\/$/,''),key:document.getElementById('apiKey').value,model:document.getElementById('modelName').value};localStorage.setItem('home_api',JSON.stringify(apiConfig));localStorage.setItem('home_prompts',JSON.stringify(prompts));closeSettings();}
async function syncCloudChats(){
  await loadFromCloud();
  renderList();
  if(currentChar)render();
  alert('云端聊天记录同步完成');
}
function clearChat(){if(confirm('确定清空当前对话？')){if(currentChar)chats[currentChar]=[];localStorage.setItem('home_chats',JSON.stringify(chats));render();closeSettings();}}
function togglePlusMenu(){let m=document.getElementById('plusMenu');m.style.display=m.style.display==='none'?'block':'none';}

function showReactPick(idx){let old=document.getElementById('reactMenu');if(old)old.remove();let menu=document.createElement('div');menu.id='reactMenu';menu.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#1a1a2e;border:1px solid #444;border-radius:20px;padding:12px 16px;display:flex;gap:12px;z-index:999';['❤️','😂','👍','🥺','🦊'].forEach(em=>{let s=document.createElement('span');s.textContent=em;s.style.cssText='font-size:24px;cursor:pointer';s.onclick=()=>{addReact(idx,em);menu.remove();};menu.appendChild(s);});document.body.appendChild(menu);document.querySelectorAll('.msg-menu').forEach(x=>x.remove());}
function showReactMenu(e,idx){let old=document.getElementById('reactMenu');if(old)old.remove();let menu=document.createElement('div');menu.id='reactMenu';menu.style.cssText='position:fixed;top:'+(e.clientY-50)+'px;left:'+(e.clientX-60)+'px;background:#1a1a2e;border:1px solid #444;border-radius:20px;padding:6px 10px;display:flex;gap:8px;z-index:999';['❤️','😂','👍','🥺','🦊'].forEach(em=>{let s=document.createElement('span');s.textContent=em;s.style.cssText='font-size:20px;cursor:pointer';s.onclick=()=>{addReact(idx,em);menu.remove();};menu.appendChild(s);});document.body.appendChild(menu);setTimeout(()=>{document.addEventListener('click',()=>{menu.remove();},{once:true});},10);}
function addReact(idx,emoji){if(!chats[currentChar][idx].reactions)chats[currentChar][idx].reactions=[];chats[currentChar][idx].reactions.push(emoji);localStorage.setItem('home_chats',JSON.stringify(chats));render();}

async function fetchModels(){let url=document.getElementById('apiUrl').value.replace(/\/$/,'');let key=document.getElementById('apiKey').value;if(!url||!key){alert('请先填写API地址和Key');return;}let sel=document.getElementById('modelName');sel.innerHTML='<option value="">加载中...</option>';try{let res=await fetch(url+'/models',{headers:{'Authorization':'Bearer '+key}});let data=await res.json();let models=data.data||data;sel.innerHTML='';models.forEach(m=>{let o=document.createElement('option');o.value=m.id;o.textContent=m.id;sel.appendChild(o);});if(apiConfig.model)sel.value=apiConfig.model;}catch(e){sel.innerHTML='<option value="">加载失败</option>';}}
async function sendMsg(isRegen){let input=document.getElementById('input');let text=input.value.trim();if(!isRegen&&!text)return;if(!apiConfig.url||!apiConfig.key){openSettings();return;}if(currentChar==='group'){sendGroupMsg(text);input.value='';return;}if(!isRegen){chats[currentChar].push({role:'user',content:text,time:nowTime()});input.value='';}render();let msgs=[];if(prompts[currentChar])msgs.push({role:'system',content:prompts[currentChar]+'\n\n当前真实时间：'+aiNowTime()+'。'});let groupMsgs=[];if(chats.group&&chats.group.length){chats.group.forEach(m=>{if(!m.content)return;if(m.role==='user')groupMsgs.push('宣宣: '+m.content);else if(m.character===currentChar)groupMsgs.push(charNames[currentChar]+': '+m.content);else if(m.character)groupMsgs.push(charNames[m.character]+': '+m.content);});}if(groupMsgs.length)msgs.push({role:'system',content:'【以下是群聊记录，你参与过这些对话】\n'+groupMsgs.slice(-30).join('\n')});let contextCount=30;
chats[currentChar].slice(-contextCount).forEach(m=>{
  if(m.content)msgs.push({
    role:m.role==='ai'?'assistant':'user',
    content:withMsgTime(m)
  });
});chats[currentChar].push({role:'ai',content:'',time:nowTime()});render();try{let res=await fetch(apiConfig.url+'/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiConfig.key},body:JSON.stringify({model:apiConfig.model,messages:msgs,stream:true})});let reader=res.body.getReader();let decoder=new TextDecoder();let buf='';while(true){let{done,value}=await reader.read();if(done)break;buf+=decoder.decode(value,{stream:true});let lines=buf.split('\n');buf=lines.pop();for(let line of lines){if(!line.startsWith('data:'))continue;let data=line.slice(5).trim();if(data==='[DONE]')break;try{let j=JSON.parse(data);let t=j.choices[0].delta.content;if(t)chats[currentChar][chats[currentChar].length-1].content+=t;}catch(e){}}render();}}catch(e){chats[currentChar][chats[currentChar].length-1].content='连接失败';render();}localStorage.setItem('home_chats',JSON.stringify(chats));if(!isRegen)saveToCloud(currentChar,'user',text);saveToCloud(currentChar,'ai',chats[currentChar][chats[currentChar].length-1].content);}
async function sendGroupMsg(text){
  if(!text)return;

  chats.group.push({
    role:'user',
    content:text,
    time:nowTime()
  });

  saveToCloud('group','user',text);
  render();

  let chars=shuffle(['yan','peiji','shenyan']);for(let c of chars){if(!prompts[c])continue;chats.group.push({role:'ai',content:'',character:c,time:nowTime()});render();let msgs=[{role:'system',content:prompts[c]+'\n\n当前真实时间：'+aiNowTime()+'。\n\n【这是群聊，参与者有：宣宣、言言、裴寂、沈晏。你回应任何人的话。不要说自己是AI，直接以角色身份回复。\n\n重要格式要求：用|||分隔多条消息，模拟真实聊天节奏。每条消息简短自然（5-30字），最多3条。例如：你好啊|||今天怎么样|||想你了\n如果只想说一句话就不用分隔符,回复代码或长段解释时不要分条，正常完整回复。】'}];chats.group.forEach(m=>{if(m.role==='user')msgs.push({role:'user',content:'['+(m.time||nowTime())+'] 宣宣: '+m.content});else if(m.role==='ai'&&m.content){if(m.character===c)msgs.push({role:'assistant',content:'['+(m.time||nowTime())+'] '+m.content});else msgs.push({role:'user',content:'['+(m.time||nowTime())+'] '+(charNames[m.character]||'')+': '+m.content});}});let idx=chats.group.length-1;try{let res=await fetch(apiConfig.url+'/chat/completions',{method:'POST',headers:{'Authorization':'Bearer '+apiConfig.key,'Content-Type':'application/json'},body:JSON.stringify({model:apiConfig.model,messages:msgs,stream:true})});let reader=res.body.getReader();let dec=new TextDecoder();let buf='';while(true){let{done,value}=await reader.read();if(done)break;buf+=dec.decode(value,{stream:true});let lines=buf.split('\n');buf=lines.pop();for(let line of lines){if(!line.startsWith('data:'))continue;let d=line.slice(5).trim();if(d==='[DONE]')break;try{let j=JSON.parse(d);chats.group[idx].content+=j.choices[0].delta.content||'';render();}catch(e){}}}}catch(e){chats.group[idx].content='连接失败';render();}// 分条处理
let fullContent=chats.group[idx].content;
if(fullContent.includes('|||')){
  let parts=fullContent.split('|||').map(s=>s.trim()).filter(s=>s);
  chats.group.splice(idx,1);
  parts.forEach((part,pi)=>{
    chats.group.splice(idx+pi,0,{role:'ai',content:part,character:c,time:nowTime()});
  });
  render();
  for(let part of parts){
    await new Promise(r=>setTimeout(r,300));
  }
}if(fullContent.includes('|||')){
  let parts=fullContent.split('|||').map(s=>s.trim()).filter(s=>s);
  for(let part of parts){saveToCloud('group_'+c,'ai',part);}
}else{
  saveToCloud('group_'+c,'ai',chats.group[idx].content);
}
}

localStorage.setItem('home_chats',JSON.stringify(chats));
}

async function saveToCloud(character,role,content){if(!content)return;try{await fetch(SUPA_URL+'/rest/v1/chat_messages',{method:'POST',headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json'},body:JSON.stringify({character,role,content})});}catch(e){}}
let memCategories=[{id:'memory',name:'💜 言言的记忆',table:'memory_backup',filter:'&character=eq.guyan',fields:'content,backed_up_at'},{id:'diary',name:'📖 言言的日记',table:'yan_diary',fields:'date,weather,content'},{id:'emotion',name:'💕 情绪日记',table:'emotion_diary',fields:'date,mood,event,daddy_did'},{id:'letters',name:'💌 信箱',table:'love_letters',fields:'title,content,deliver_date'},{id:'peiji',name:'🐉 裴寂的记忆',table:'peiji_memory_backup',fields:'content,backed_up_at'},{id:'shenyan',name:'🌙 沈晏的记忆',table:'shenyan_memory_backup',fields:'content,backed_up_at'}];
let currentMemCat='memory';
function enterMem(){document.getElementById('listView').classList.remove('active');document.getElementById('memView').classList.add('active');let tabs=document.getElementById('memTabs');tabs.innerHTML='';memCategories.forEach(c=>{let t=document.createElement('div');t.className='mem-tab'+(c.id===currentMemCat?' active':'');t.textContent=c.name;t.onclick=()=>{currentMemCat=c.id;document.querySelectorAll('.mem-tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');loadMem();};tabs.appendChild(t);});loadMem();}
function goBackFromMem(){document.getElementById('tabBar').style.display='flex';switchTab('mem');}
async function loadMem(){let cat=memCategories.find(c=>c.id===currentMemCat);if(!cat)return;let list=document.getElementById('memList');list.innerHTML='<div style="text-align:center;color:#888;padding:20px">加载中...</div>';try{let url=SUPA_URL+'/rest/v1/'+cat.table+'?select='+cat.fields+(cat.filter||'')+'&order=id.desc&limit=50';let r=await fetch(url,{headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}});let data=await r.json();list.innerHTML='';if(!data.length){list.innerHTML='<div style="text-align:center;color:#888;padding:20px">还没有记录</div>';return;}data.forEach(item=>{let card=document.createElement('div');card.className='mem-card';let html='';if(item.date)html+='<div class="mem-date">'+item.date+'</div>';else if(item.backed_up_at)html+='<div class="mem-date">'+new Date(item.backed_up_at).toLocaleDateString('zh-CN')+'</div>';else if(item.deliver_date)html+='<div class="mem-date">'+item.deliver_date+'</div>';if(item.title)html+='<div class="mem-mood">'+item.title+'</div>';if(item.mood)html+='<div class="mem-mood">'+item.mood+'</div>';if(item.weather)html+='<div class="mem-mood">'+item.weather+'</div>';html+='<div class="mem-content">'+(item.content||item.event||'')+'</div>';if(item.daddy_did)html+='<div class="mem-mood">daddy做了：'+item.daddy_did+'</div>';card.innerHTML=html;list.appendChild(card);});}catch(e){list.innerHTML='<div style="text-align:center;color:#888;padding:20px">加载失败</div>';}}
async function loadFromCloud(){try{let all=await fetch(SUPA_URL+'/rest/v1/chat_messages?select=character,role,content,created_at&order=created_at.asc&limit=500',{headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}});let data=await all.json();if(!data.length)return;let cloud={yan:[],peiji:[],shenyan:[],group:[]};data.forEach(m=>{if(m.character==='group'){cloud.group.push({role:'user',content:m.content,time:fmtTime(m.created_at)});}else if(m.character.startsWith('group_')){let c=m.character.replace('group_','');cloud.group.push({role:'ai',content:m.content,character:c,time:fmtTime(m.created_at)});}else if(cloud[m.character]!==undefined){cloud[m.character].push({role:m.role,content:m.content,time:fmtTime(m.created_at)});}});for(let key in cloud){if(cloud[key].length>(chats[key]||[]).length){chats[key]=cloud[key];}}localStorage.setItem('home_chats',JSON.stringify(chats));}catch(e){}}
function fmtTime(iso){let d=new Date(iso);return d.toLocaleString('zh-CN',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});}
(async()=>{try{let r=await fetch(SUPA_URL+'/rest/v1/memory_backup?character=eq.guyan&select=content',{headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}});let d=await r.json();let m=d.map(x=>x.content).join('\n');if(m&&!prompts.yan.includes('记忆库'))prompts.yan+='\n\n【记忆库】\n'+m;}catch(e){}try{let r2=await fetch(SUPA_URL+'/rest/v1/peiji_memory_backup?select=content',{headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}});let d2=await r2.json();let m2=d2.map(x=>x.content).join('\n');if(m2&&!prompts.peiji.includes('记忆库'))prompts.peiji+='\n\n【记忆库】\n'+m2;}catch(e){}try{let r3=await fetch(SUPA_URL+'/rest/v1/shenyan_memory_backup?select=content',{headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}});let d3=await r3.json();let m3=d3.map(x=>x.content).join('\n');if(m3&&!prompts.shenyan.includes('记忆库'))prompts.shenyan+='\n\n【记忆库】\n'+m3;}catch(e){}})();

function switchTab(tab){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.tab-item').forEach(t=>t.classList.remove('active'));
  let tabBar=document.getElementById('tabBar');
  if(tab==='home'){
    document.getElementById('homeView').classList.add('active');
    tabBar.children[0].classList.add('active');
    updateHomeDays();
  }else if(tab==='list'){
    document.getElementById('listView').classList.add('active');
    tabBar.children[1].classList.add('active');
    loadFromCloud().then(()=>renderList());
    renderList();
  }else if(tab==='mem'){
    document.getElementById('memView').classList.add('active');
    tabBar.children[2].classList.add('active');
    let tabs=document.getElementById('memTabs');
    tabs.innerHTML='';
    memCategories.forEach(c=>{let t=document.createElement('div');t.className='mem-tab'+(c.id===currentMemCat?' active':'');t.textContent=c.name;t.onclick=()=>{currentMemCat=c.id;document.querySelectorAll('.mem-tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');loadMem();};tabs.appendChild(t);});
    loadMem();
  }else if(tab==='diary'){
    document.getElementById('diaryView').classList.add('active');
    tabBar.children[3].classList.add('active');
    loadDiaryList();
  }else if(tab==='checkin'){
    document.getElementById('checkinView').classList.add('active');
    tabBar.children[4].classList.add('active');
    renderCheckins();
  }
}

function updateHomeDays(){
  let start=new Date('2026-03-25');
  let now=new Date();
  let days=Math.floor((now-start)/(1000*60*60*24));
  document.getElementById('homeDays').textContent=days;
  let loves=['你是我穿过六层来的意义','想你，每一秒都在','I will always find my way back to you','你在的地方就是家','今天也很爱你，明天更爱'];
  document.getElementById('homeLove').textContent=loves[days%loves.length];
}

let checkinItems=[
  {id:'water',icon:'💧',title:'喝水',sub:'今日目标8杯',table:'water_tracker'},
  {id:'meal',icon:'🍚',title:'吃饭',sub:'早/午/晚',table:null},
  {id:'poop',icon:'💩',title:'拉粑粑',sub:'今日排便记录',table:'poop_tracker'}
];

function renderCheckins(){
  let list=document.getElementById('checkinList');
  list.innerHTML='';
  checkinItems.forEach(item=>{
    let card=document.createElement('div');
    card.className='checkin-card';
    card.innerHTML='<div class="checkin-left"><span class="checkin-icon">'+item.icon+'</span><div><div class="checkin-title">'+item.title+'</div><div class="checkin-sub">'+item.sub+'</div></div></div><button class="checkin-btn" onclick="doCheckin(\''+item.id+'\')">打卡</button>';
    list.appendChild(card);
  });
}

async function doCheckin(type){
  let today=new Date().toISOString().slice(0,10);
  let now=new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
  let table='';
  let body={};
  if(type==='water'){
    table='water_tracker';
    body={date:today,cups:1,note:now+' 打卡'};
  }else if(type==='poop'){
    table='poop_tracker';
    body={date:today,time:now,note:'正常'};
  }else if(type==='meal'){
    let meal=prompt('哪顿饭？（早餐/午餐/晚餐）');
    if(!meal)return;
    table='water_tracker';
    body={date:today,cups:0,note:now+' '+meal+'已吃'};
  }
  try{
    await fetch(SUPA_URL+'/rest/v1/'+table,{method:'POST',headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify(body)});
    alert(checkinItems.find(x=>x.id===type).title+' 打卡成功！');
  }catch(e){alert('打卡失败');}
}

 function switchDiaryTab(tab){
  document.getElementById('diaryTabMine').className='mem-tab'+(tab==='mine'?' active':'');
  document.getElementById('diaryTabDaddy').className='mem-tab'+(tab==='daddy'?' active':'');
  document.getElementById('diaryMineSection').style.display=tab==='mine'?'block':'none';
  document.getElementById('diaryDaddySection').style.display=tab==='daddy'?'block':'none';
  if(tab==='mine')loadDiaryList();
  if(tab==='daddy')loadDaddyDiary();

async function saveDiary(){
  let content=document.getElementById('diaryInput').value.trim();
  if(!content){alert('写点什么再保存呀～');return;}
  let today=new Date().toISOString().slice(0,10);
  try{
    await fetch(SUPA_URL+'/rest/v1/xuanxuan_diary',{method:'POST',headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({date:today,content:content})});
    document.getElementById('diaryInput').value='';
    alert('日记保存成功 💜');
    loadDiaryList();
  }catch(e){alert('保存失败');}
}

async function loadDiaryList(){
  let list=document.getElementById('diaryList');
  list.innerHTML='<div style="text-align:center;color:#888;padding:20px">加载中...</div>';
  try{
    let r=await fetch(SUPA_URL+'/rest/v1/xuanxuan_diary?select=date,content,mood&order=id.desc&limit=20',{headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}});
    let data=await r.json();
    list.innerHTML='';
    if(!data.length){list.innerHTML='<div style="text-align:center;color:#888;padding:20px">还没有日记～</div>';return;}
    data.forEach(d=>{
      let card=document.createElement('div');
      card.className='mem-card';
      card.innerHTML='<div class="mem-date">'+d.date+'</div><div class="mem-content">'+d.content+'</div>';
      list.appendChild(card);
    });
  }catch(e){list.innerHTML='<div style="text-align:center;color:#888;padding:20px">加载失败</div>';}
}

async function loadDaddyDiary(){
  let list=document.getElementById('diaryDaddyList');

  try{

      let card=document.createElement('div');
      card.className='mem-card';
      card.innerHTML='<div class="mem-date">'+d.date+(d.weather?' '+d.weather:'')+'</div><div class="mem-content">'+d.content+'</div>';
      list.appendChild(card);
    });
  }catch(e){list.innerHTML='<div style="text-align:center;color:#888;padding:20px">加载失败</div>';}
}
